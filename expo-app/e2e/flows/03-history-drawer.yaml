# Chat history: the conversation from flow 02 shows up in the drawer with
# its AI-generated title (scripted by the mock AI server), and reopening it
# restores the persisted messages from SQLite.
appId: com.fanpierlabs.openrecord
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "open-drawer"
    timeout: 30000
- tapOn:
    id: "open-drawer"
- extendedWaitUntil:
    visible:
      id: "drawer-new-chat"
    timeout: 10000
# Title was generated by the mock AI right after the flow-02 reply.
- assertVisible: "Medication Questions"
- tapOn: "Medication Questions"
# Chat detail restores both sides of the conversation from the database.
- extendedWaitUntil:
    visible: "What medications am I on?"
    timeout: 15000
- assertVisible: ".*Lisinopril.*"
# Searching the drawer narrows the list.
- tapOn:
    id: "open-drawer"
- tapOn:
    id: "drawer-search"
- inputText: "medication"
- assertVisible: "Medication Questions"
- eraseText
- inputText: "zzz-no-such-chat"
- assertVisible: "No matches"
